# GitHub Actions workflow for SonarQube (self-hosted)
# Add SONAR_HOST_URL and SONAR_TOKEN as GitHub Secrets

name: SonarQube Self-Hosted Scan

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    name: Build and analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        if: contains(matrix.language, 'java')
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Python
        uses: actions/setup-python@v5
        if: matrix.language == 'python'
        with:
          python-version: '3.11'

      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          projectKey: ${{ env.PROJECT_KEY }}
          projectName: ${{ env.PROJECT_NAME }}

  # Matrix build for multiple languages
  matrix:
    include:
      - language: python
        path: python/
        projectKey: BMillerCodes_sonarqube-examples_python
        projectName: SonarQube Python Example
      - language: java
        path: java/
        projectKey: BMillerCodes_sonarqube-examples_java
        projectName: SonarQube Java Example
      # Add more languages as needed
