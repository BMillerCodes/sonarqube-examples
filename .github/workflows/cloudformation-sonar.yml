name: SonarQube Scan - CloudFormation

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    name: Build and analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Mandatory to retrieve history

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.1x'

      - name: Install cfn-lint
        run: pip install cfn-lint

      - name: Validate CloudFormation
        run: cfn-lint cloudformation/src/template.yaml 2>&1 || true # Adjusted path
        continue-on-error: true

      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@v4 # Using master for consistency
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Needed to get PR information
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          projectBaseDir: .
          args: >
            -Dsonar.projectKey=BMillerCodes_sonarqube-examples_cloudformation
            -Dsonar.projectName=SonarQube CloudFormation Example
            -Dsonar.sources=cloudformation/src/
