name: SonarQube Scan - Ruby

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    name: Build and analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Mandatory to retrieve history

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install deps
        run: bundle install --gemfile=ruby/Gemfile --path=vendor/bundle 2>&1 || true # Adjusted path and added --gemfile and --path
        working-directory: ruby # Set working directory to ruby for bundle install

      - name: Build
        run: ruby -c ruby/src/main.rb && ruby -c ruby/src/helpers.rb 2>&1 || true # Adjusted path
        continue-on-error: true

      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: SonarQube Scan
        uses: SonarSource/sonarcloud-github-action@master # Using master for consistency
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Needed to get PR information
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
         projectKey: BMillerCodes_sonarqube-examples_ruby
         projectName: SonarQube Ruby Example
         sources: ruby/src/ # Adjusted source path
