name: SonarQube Scan
on:
  push:
    branches: [main, feat/**]
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Ansible Lint
        run: pip install ansible-lint 2>&1 | tail -3
      - name: Build
        run: ansible-lint src/site.yaml 2>&1 || true
        continue-on-error: true
      - name: SonarQube Scan
        uses: sonarsource/sonarcloud-github-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
