name: SonarQube Scan
on:
  push:
    branches: [main, feat/**]
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Salesforce DX
        uses: forcesofdebug/setup-sfdx@v1
        with:
          version: 'latest'
        continue-on-error: true
      - name: Build
        run: echo "Apex - requires Salesforce org for compilation"
        continue-on-error: true
      - name: SonarQube Scan
        uses: sonarsource/sonarcloud-github-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
