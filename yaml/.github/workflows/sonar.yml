name: SonarQube Scan
on:
  push:
    branches: [main, feat/**]
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Build
        run: pip install pyyaml -q && python3 -c "import yaml; [yaml.safe_load(open(f)) for f in __import__('glob').glob('src/*.yaml')]" 2>&1 || true
        continue-on-error: true
      - name: SonarQube Scan
        uses: sonarsource/sonarcloud-github-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}