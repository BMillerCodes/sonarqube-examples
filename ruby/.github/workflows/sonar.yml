name: SonarQube Scan
on:
  push:
    branches: [main, feat/**]
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
      - name: Install deps
        run: bundle install 2>&1 || true
      - name: Build
        run: ruby -c src/main.rb && ruby -c src/helpers.rb 2>&1 || true
        continue-on-error: true
      - name: SonarQube Scan
        uses: sonarsource/sonarcloud-github-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
