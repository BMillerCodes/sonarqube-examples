apiVersion: apps/v1
kind: Deployment
metadata:
  name: sonarqube-example
  labels:
    app: sonarqube-example
    environment: production
spec:
  replicas: 3
  selector:
    matchLabels:
      app: sonarqube-example
  template:
    metadata:
      labels:
        app: sonarqube-example
        environment: production
    spec:
      containers:
        - name: app
          image: nginx:1.25-alpine
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              memory: "64Mi"
              cpu: "250m"
            limits:
              memory: "128Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
          env:
            - name: NODE_ENV
              value: production
