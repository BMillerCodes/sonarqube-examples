apiVersion: v1
kind: Service
metadata:
  name: sonarqube-example-service
  labels:
    app: sonarqube-example
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
      name: http
  selector:
    app: sonarqube-example
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: sonarqube-example-config
data:
  NODE_ENV: "production"
  LOG_LEVEL: "info"
